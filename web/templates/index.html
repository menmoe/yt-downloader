<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #141414;
      --surface2:  #1e1e1e;
      --border:    #2a2a2a;
      --border2:   #333;
      --red:       #e63535;
      --red-dim:   #a02020;
      --red-glow:  rgba(230, 53, 53, 0.15);
      --text:      #f0f0f0;
      --text-mid:  #a0a0a0;
      --text-dim:  #555;
      --success:   #3dba6e;
      --warning:   #e6a020;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
      --radius:    4px;
      --transition: 140ms ease;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ───────────────────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    /* ── Header ───────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
    }

    .header-play {
      width: 28px;
      height: 28px;
      background: var(--red);
      clip-path: polygon(10% 0%, 100% 50%, 10% 100%);
      flex-shrink: 0;
      position: relative;
      top: 2px;
    }

    h1 {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 36px;
      font-family: var(--mono);
    }

    /* ── Section label ────────────────────────────────────────── */
    .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .section { margin-bottom: 28px; }

    /* ── Divider ──────────────────────────────────────────────── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ── URL input row ────────────────────────────────────────── */
    .url-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color var(--transition);
    }

    input[type="text"]:focus {
      border-color: var(--border2);
    }

    input[type="text"]::placeholder {
      color: var(--text-dim);
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), opacity var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--red);
      color: #fff;
    }

    .btn-primary:hover { background: #cc2a2a; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-mid);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: var(--border); color: var(--text); }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── Video list ───────────────────────────────────────────── */
    #video-list-section { display: none; }

    .list-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      align-items: center;
    }

    .list-controls span {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-mid);
      margin-left: auto;
    }

    .btn-link {
      background: none;
      border: none;
      color: var(--red);
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      transition: color var(--transition);
    }

    .btn-link:hover { color: var(--text); }
    .btn-link.muted { color: var(--text-dim); }
    .btn-link.muted:hover { color: var(--text-mid); }

    .video-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 280px;
      overflow-y: auto;
    }

    .video-list::-webkit-scrollbar { width: 4px; }
    .video-list::-webkit-scrollbar-track { background: transparent; }
    .video-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .video-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--transition);
      user-select: none;
    }

    .video-item:last-child { border-bottom: none; }
    .video-item:hover { background: var(--surface2); }
    .video-item.checked { }

    .video-item input[type="checkbox"] {
      accent-color: var(--red);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .video-num {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      min-width: 24px;
      flex-shrink: 0;
    }

    .video-title {
      font-size: 13px;
      color: var(--text-mid);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color var(--transition);
    }

    .video-item:hover .video-title,
    .video-item.checked .video-title { color: var(--text); }

    /* ── Format & Quality ─────────────────────────────────────── */
    .options-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      background: var(--surface);
    }

    .radio-item:hover { border-color: var(--border2); background: var(--surface2); }

    .radio-item input[type="radio"] {
      accent-color: var(--red);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .radio-item.selected {
      border-color: var(--red-dim);
      background: var(--red-glow);
    }

    .radio-label {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-mid);
    }

    .radio-item.selected .radio-label { color: var(--text); }

    /* ── Download button row ──────────────────────────────────── */
    .action-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── Progress ─────────────────────────────────────────────── */
    #progress-section { display: none; }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .progress-title {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-mid);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
    }

    .progress-stats {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .progress-bar-track {
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--red);
      border-radius: 2px;
      width: 0%;
      transition: width 300ms ease;
    }

    .progress-bar-fill.done { background: var(--success); }

    .progress-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Log ──────────────────────────────────────────────────── */
    .log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      padding: 12px 14px;
      height: 130px;
      overflow-y: auto;
      margin-top: 12px;
      line-height: 1.8;
    }

    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .log-line { display: block; }
    .log-line.success { color: var(--success); }
    .log-line.warn    { color: var(--warning); }
    .log-line.error   { color: var(--red); }

    /* ── Files section ────────────────────────────────────────── */
    #files-section { display: none; }

    .files-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color var(--transition);
    }

    .file-item:hover { border-color: var(--border2); }

    .file-name {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-mid);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-download {
      background: none;
      border: 1px solid var(--border);
      color: var(--success);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background var(--transition), border-color var(--transition);
    }

    .btn-download:hover {
      background: rgba(61, 186, 110, 0.1);
      border-color: var(--success);
    }

    /* ── Status message ───────────────────────────────────────── */
    .status-msg {
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .status-msg.info    { color: var(--text-mid); background: var(--surface); }
    .status-msg.success { color: var(--success);  background: rgba(61,186,110,0.08); border-color: rgba(61,186,110,0.3); }
    .status-msg.error   { color: var(--red);       background: rgba(230,53,53,0.08); border-color: rgba(230,53,53,0.3); }

    /* ── Spinner ──────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border2);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Single-video note ────────────────────────────────────── */
    .single-note {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-mid);
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* ── Footer ───────────────────────────────────────────────── */
    .footer {
      margin-top: 64px;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .footer a { color: var(--text-dim); text-decoration: none; }
    .footer a:hover { color: var(--text-mid); }

    /* ── Fade-in ──────────────────────────────────────────────── */
    .fade-in {
      animation: fadeIn 200ms ease forwards;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
<div class="page">
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-play"></div>
      <h1>yt-downloader</h1>
    </div>
    <p class="subtitle">// self-hosted web interface</p>

    <!-- URL -->
    <div class="section">
      <div class="label">YouTube URL</div>
      <div class="url-row">
        <input type="text" id="url-input" placeholder="https://youtube.com/watch?v=... or playlist URL"
               autocomplete="off" spellcheck="false">
        <button class="btn btn-ghost" id="fetch-btn" onclick="doFetch()">Fetch</button>
      </div>
    </div>

    <!-- Video list (playlist) -->
    <div class="section" id="video-list-section">
      <div class="label">Videos</div>
      <div class="list-controls">
        <button class="btn-link" onclick="selectAll()">Select all</button>
        <button class="btn-link muted" onclick="selectNone()">Select none</button>
        <span id="selected-count"></span>
      </div>
      <div class="video-list" id="video-list"></div>
    </div>

    <!-- Single video note -->
    <div class="section" id="single-video-section" style="display:none">
      <div class="single-note" id="single-note"></div>
    </div>

    <hr>

    <!-- Format & Quality -->
    <div class="section">
      <div class="options-row">
        <div>
          <div class="label">Format</div>
          <div class="radio-group" id="fmt-group">
            <label class="radio-item selected">
              <input type="radio" name="fmt" value="mp3" checked onchange="onFmtChange()">
              <span class="radio-label">MP3 &mdash; audio only</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="fmt" value="mp4" onchange="onFmtChange()">
              <span class="radio-label">MP4 &mdash; video + audio</span>
            </label>
          </div>
        </div>
        <div>
          <div class="label">Quality</div>
          <div class="radio-group" id="quality-group">
            <!-- populated by JS from Flask template data -->
          </div>
        </div>
      </div>
    </div>

    <hr>

    <!-- Action row -->
    <div class="action-row">
      <button class="btn btn-ghost" id="cancel-btn" onclick="doCancel()" disabled>Cancel</button>
      <button class="btn btn-primary" id="dl-btn" onclick="doDownload()">Download</button>
    </div>

    <!-- Progress -->
    <div id="progress-section" style="margin-top:28px">
      <hr style="margin-top:0">
      <div class="label">Progress</div>
      <div class="progress-header">
        <span class="progress-title" id="progress-title">Starting...</span>
        <span class="progress-stats" id="progress-stats"></span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <div class="progress-count" id="progress-count"></div>
      <div class="log" id="log"></div>
    </div>

    <!-- Files ready -->
    <div id="files-section" style="margin-top:28px">
      <hr style="margin-top:0">
      <div class="label" style="margin-bottom:12px">Ready to download</div>
      <div class="files-list" id="files-list"></div>
      <div style="margin-top:12px; text-align:right">
        <button class="btn btn-ghost" onclick="reset()">Start over</button>
      </div>
    </div>

    <div class="footer">
      <a href="https://github.com/moishy-r/yt-downloader" target="_blank">github.com/moishy-r/yt-downloader</a>
      &nbsp;&middot;&nbsp;
      for personal use only
    </div>
  </div>
</div>

<script>
// ── Quality data from Flask ────────────────────────────────────────────────
const MP3_QUALITIES = {{ mp3_qualities | tojson }};
const MP4_QUALITIES = {{ mp4_qualities | tojson }};

// ── State ──────────────────────────────────────────────────────────────────
let _entries    = [];
let _jobId      = null;
let _evtSource  = null;
let _isFetching = false;
let _isDling    = false;

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  buildQualityPanel("mp3");
  document.getElementById("url-input").addEventListener("keydown", e => {
    if (e.key === "Enter") doFetch();
  });
});

// ── Quality panel ──────────────────────────────────────────────────────────
function buildQualityPanel(fmt) {
  const group   = document.getElementById("quality-group");
  const options = fmt === "mp3" ? MP3_QUALITIES : MP4_QUALITIES;
  group.innerHTML = "";
  options.forEach(([val, label], i) => {
    const item = document.createElement("label");
    item.className = "radio-item" + (i === 0 ? " selected" : "");
    item.innerHTML = `
      <input type="radio" name="quality" value="${val}" ${i === 0 ? "checked" : ""}
             onchange="updateRadioSelected('quality-group')">
      <span class="radio-label">${label}</span>
    `;
    group.appendChild(item);
  });
}

function onFmtChange() {
  const fmt = document.querySelector('input[name="fmt"]:checked').value;
  buildQualityPanel(fmt);
  updateRadioSelected("fmt-group");
}

function updateRadioSelected(groupId) {
  document.querySelectorAll(`#${groupId} .radio-item`).forEach(el => {
    el.classList.toggle("selected", el.querySelector("input").checked);
  });
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function doFetch() {
  const url = document.getElementById("url-input").value.trim();
  if (!url) return;
  if (_isFetching || _isDling) return;

  _isFetching = true;
  const btn = document.getElementById("fetch-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  hideSection("video-list-section");
  hideSection("single-video-section");
  hideSection("progress-section");
  hideSection("files-section");

  try {
    const res  = await fetch("/api/fetch", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({url}),
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      showError(data.error || "Failed to fetch video info.");
      return;
    }

    _entries = data.entries;
    if (_entries.length === 1) {
      showSingleVideo(_entries[0]);
    } else {
      buildVideoList(_entries);
      showSection("video-list-section");
    }
  } catch (e) {
    showError("Network error: " + e.message);
  } finally {
    _isFetching = false;
    btn.disabled = false;
    btn.textContent = "Fetch";
  }
}

// ── Video list ─────────────────────────────────────────────────────────────
function buildVideoList(entries) {
  const list = document.getElementById("video-list");
  list.innerHTML = "";
  entries.forEach((e, i) => {
    const item = document.createElement("div");
    item.className = "video-item checked";
    item.dataset.index = i;
    item.innerHTML = `
      <input type="checkbox" checked onchange="onCheckChange()">
      <span class="video-num">${String(e.index).padStart(2, "0")}</span>
      <span class="video-title">${escHtml(e.title)}</span>
    `;
    item.addEventListener("click", ev => {
      if (ev.target.type !== "checkbox") {
        const cb = item.querySelector("input");
        cb.checked = !cb.checked;
        onCheckChange();
      }
    });
    list.appendChild(item);
  });
  updateSelectedCount();
}

function showSingleVideo(entry) {
  document.getElementById("single-note").textContent =
    `1 video found: ${entry.title}`;
  showSection("single-video-section");
}

function onCheckChange() {
  document.querySelectorAll(".video-item").forEach(item => {
    const checked = item.querySelector("input").checked;
    item.classList.toggle("checked", checked);
  });
  updateSelectedCount();
}

function updateSelectedCount() {
  const total    = _entries.length;
  const selected = getSelectedEntries().length;
  document.getElementById("selected-count").textContent =
    `${selected} / ${total} selected`;
}

function getSelectedEntries() {
  if (_entries.length === 1) return _entries;
  const selected = [];
  document.querySelectorAll(".video-item").forEach((item, i) => {
    if (item.querySelector("input").checked) selected.push(_entries[i]);
  });
  return selected;
}

function selectAll() {
  document.querySelectorAll(".video-item input").forEach(cb => cb.checked = true);
  onCheckChange();
}

function selectNone() {
  document.querySelectorAll(".video-item input").forEach(cb => cb.checked = false);
  onCheckChange();
}

// ── Download ───────────────────────────────────────────────────────────────
async function doDownload() {
  if (_isDling) return;

  const entries = getSelectedEntries();
  if (entries.length === 0) {
    showError("Select at least one video first.");
    return;
  }
  if (_entries.length === 0) {
    showError("Fetch a URL first.");
    return;
  }

  const fmt     = document.querySelector('input[name="fmt"]:checked').value;
  const quality = document.querySelector('input[name="quality"]:checked').value;

  _isDling = true;
  document.getElementById("dl-btn").disabled    = true;
  document.getElementById("cancel-btn").disabled = false;
  document.getElementById("fetch-btn").disabled  = true;
  hideSection("files-section");
  showProgress();
  clearLog();

  try {
    const res  = await fetch("/api/download", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({entries, fmt, quality}),
    });
    const data = await res.json();
    if (!res.ok || data.error) { showError(data.error); resetDownloadState(); return; }

    _jobId = data.job_id;
    listenProgress(_jobId);
  } catch (e) {
    showError("Network error: " + e.message);
    resetDownloadState();
  }
}

function doCancel() {
  if (_evtSource) { _evtSource.close(); _evtSource = null; }
  if (_jobId) {
    fetch(`/api/cleanup/${_jobId}`, {method: "POST"});
    _jobId = null;
  }
  appendLog("Cancelled.", "warn");
  setProgress(0, "Cancelled");
  resetDownloadState();
}

// ── SSE progress ───────────────────────────────────────────────────────────
function listenProgress(jobId) {
  _evtSource = new EventSource(`/api/progress/${jobId}`);

  _evtSource.onmessage = ev => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === "ping") return;

    if (msg.type === "progress") {
      const pct     = msg.pct || 0;
      const overall = ((msg.video - 1) + pct / 100) / msg.total * 100;
      setProgress(overall,
        `[${msg.video}/${msg.total}] ${pct.toFixed(1)}%`,
        `${msg.speed || ""}  ETA ${msg.eta || "--:--"}`);
    }

    if (msg.type === "log") {
      appendLog(msg.message);
    }

    if (msg.type === "done") {
      _evtSource.close(); _evtSource = null;
      setProgress(100, "Done", "");
      document.getElementById("progress-bar").classList.add("done");
      appendLog("All done.", "success");
      showFiles(jobId, msg.files);
      resetDownloadState();
    }

    if (msg.type === "error") {
      _evtSource.close(); _evtSource = null;
      appendLog("Error: " + msg.message, "error");
      resetDownloadState();
    }
  };

  _evtSource.onerror = () => {
    if (_evtSource) { _evtSource.close(); _evtSource = null; }
    appendLog("Connection lost.", "error");
    resetDownloadState();
  };
}

// ── Files ──────────────────────────────────────────────────────────────────
function showFiles(jobId, files) {
  const list = document.getElementById("files-list");
  list.innerHTML = "";
  files.forEach(f => {
    const item = document.createElement("div");
    item.className = "file-item fade-in";
    item.innerHTML = `
      <span class="file-name">${escHtml(f.name)}</span>
      <button class="btn-download" onclick="downloadFile('${jobId}', ${f.id}, '${escHtml(f.name)}')">
        Download
      </button>
    `;
    list.appendChild(item);
  });
  showSection("files-section");
}

function downloadFile(jobId, fileId, name) {
  const a  = document.createElement("a");
  a.href   = `/api/file/${jobId}/${fileId}`;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── Progress UI ────────────────────────────────────────────────────────────
function showProgress() {
  showSection("progress-section");
  setProgress(0, "Starting...", "");
}

function setProgress(pct, title, stats) {
  document.getElementById("progress-bar").style.width = Math.min(pct, 100) + "%";
  if (title !== undefined) document.getElementById("progress-title").textContent = title;
  if (stats !== undefined) document.getElementById("progress-stats").textContent = stats;
}

function appendLog(msg, cls) {
  const log  = document.getElementById("log");
  const line = document.createElement("span");
  line.className = "log-line" + (cls ? " " + cls : "");
  line.textContent = msg;
  log.appendChild(line);
  log.appendChild(document.createTextNode("\n"));
  log.scrollTop = log.scrollHeight;
}

function clearLog() {
  document.getElementById("log").innerHTML = "";
  document.getElementById("progress-bar").classList.remove("done");
}

// ── Helpers ────────────────────────────────────────────────────────────────
function showSection(id)  { document.getElementById(id).style.display = ""; }
function hideSection(id)  { document.getElementById(id).style.display = "none"; }

function showError(msg) {
  appendLog(msg, "error");
  showSection("progress-section");
}

function resetDownloadState() {
  _isDling = false;
  document.getElementById("dl-btn").disabled    = false;
  document.getElementById("cancel-btn").disabled = true;
  document.getElementById("fetch-btn").disabled  = false;
}

function reset() {
  if (_jobId) {
    fetch(`/api/cleanup/${_jobId}`, {method: "POST"});
    _jobId = null;
  }
  if (_evtSource) { _evtSource.close(); _evtSource = null; }
  _entries = [];
  _isDling = false;
  _isFetching = false;
  document.getElementById("url-input").value = "";
  document.getElementById("fetch-btn").disabled  = false;
  document.getElementById("dl-btn").disabled    = false;
  document.getElementById("cancel-btn").disabled = true;
  hideSection("video-list-section");
  hideSection("single-video-section");
  hideSection("progress-section");
  hideSection("files-section");
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>
